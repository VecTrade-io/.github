name: CI — OpenAPI Spec
on:
  push:
    branches: [main]
    paths: ['packages/openapi/**']
  pull_request:
    paths: ['packages/openapi/**']

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli
      - name: Lint OpenAPI spec
        run: spectral lint packages/openapi/spec.yaml --ruleset packages/openapi/.spectral.yaml

  breaking-change-detection:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Install oasdiff
        run: |
          curl -sSL https://github.com/Tufin/oasdiff/releases/latest/download/oasdiff_linux_amd64.tar.gz | tar xz
          sudo mv oasdiff /usr/local/bin/
      - name: Check for breaking changes
        run: |
          git show origin/main:packages/openapi/spec.yaml > /tmp/spec-base.yaml 2>/dev/null || echo "No base spec found, skipping"
          if [ -f /tmp/spec-base.yaml ]; then
            oasdiff breaking /tmp/spec-base.yaml packages/openapi/spec.yaml
          fi

  generate-docs:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
      - name: Install Redocly
        run: npm install -g @redocly/cli
      - name: Build API reference
        run: |
          cd packages/openapi
          redocly build-docs spec.yaml --output=dist/index.html
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: api-reference
          path: packages/openapi/dist/
