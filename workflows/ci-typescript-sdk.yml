name: CI — TypeScript SDK
on:
  push:
    branches: [main]
    paths: ['packages/typescript-sdk/**']
  pull_request:
    paths: ['packages/typescript-sdk/**']

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: packages/typescript-sdk/pnpm-lock.yaml
      - name: Install
        run: |
          cd packages/typescript-sdk
          pnpm install --frozen-lockfile
      - name: Lint
        run: |
          cd packages/typescript-sdk
          pnpm lint
      - name: Type check
        run: |
          cd packages/typescript-sdk
          pnpm typecheck

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ['18', '20', '22']
      fail-fast: false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          cache-dependency-path: packages/typescript-sdk/pnpm-lock.yaml
      - name: Install
        run: |
          cd packages/typescript-sdk
          pnpm install --frozen-lockfile
      - name: Test
        run: |
          cd packages/typescript-sdk
          pnpm test -- --coverage
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22'
        uses: codecov/codecov-action@v4
        with:
          file: packages/typescript-sdk/coverage/lcov.info
          flags: typescript-sdk

  # Test in alternative runtimes
  runtime-compat:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        runtime: [bun, deno]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: packages/typescript-sdk/pnpm-lock.yaml
      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
      - name: Setup Deno
        if: matrix.runtime == 'deno'
        uses: denoland/setup-deno@v2
      - name: Install
        run: |
          cd packages/typescript-sdk
          pnpm install --frozen-lockfile
          pnpm build
      - name: Test (${{ matrix.runtime }})
        run: |
          cd packages/typescript-sdk
          pnpm test:${{ matrix.runtime }}
