name: CI — FinKit
on:
  push:
    branches: [main]
    paths: ['packages/finkit/**']
  pull_request:
    paths: ['packages/finkit/**']

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install
        run: |
          cd packages/finkit
          pip install -e ".[dev]"
      - name: Lint
        run: |
          cd packages/finkit
          ruff check .
          ruff format --check .
      - name: Type check
        run: |
          cd packages/finkit
          mypy src/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
      fail-fast: false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          cd packages/finkit
          pip install -e ".[dev]"
      - name: Test
        run: |
          cd packages/finkit
          pytest tests/ -v --cov=src/finkit --cov-report=xml
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: packages/finkit/coverage.xml
          flags: finkit
