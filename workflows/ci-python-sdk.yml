name: CI — Python SDK
on:
  push:
    branches: [main]
    paths: ['packages/python-sdk/**']
  pull_request:
    paths: ['packages/python-sdk/**']

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          cd packages/python-sdk
          pip install -e ".[dev]"
      - name: Lint
        run: |
          cd packages/python-sdk
          ruff check .
          ruff format --check .
      - name: Type check
        run: |
          cd packages/python-sdk
          mypy src/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
      fail-fast: false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          cd packages/python-sdk
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          cd packages/python-sdk
          pytest tests/ -v --cov=src/vectrade --cov-report=xml
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: packages/python-sdk/coverage.xml
          flags: python-sdk

  contract-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install SDK
        run: |
          cd packages/python-sdk
          pip install -e ".[dev]"
      - name: Run contract tests
        run: |
          cd sdk-generator
          python -m pytest tests/contract/ -v --sdk=python
        env:
          VECTRADE_API_KEY: ${{ secrets.SANDBOX_API_KEY }}
          VECTRADE_BASE_URL: https://sandbox.vectrade.io/api/v1
